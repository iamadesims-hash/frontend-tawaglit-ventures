<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Guided Tour - Tawaglit Ventures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="bg-gray-950 text-white pt-20">
  <!-- Shared Navbar -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 onclick="window.location='index.html'" class="text-2xl font-bold text-emerald-400 cursor-pointer">Tawaglit<span class="text-white">Ventures</span></h1>
      <div class="hidden md:flex gap-8 text-sm font-medium">
        <a href="properties.html">Properties</a>
        <a href="messages.html">Messages</a>
        <a href="tour.html" class="text-emerald-400">Safe Tours</a>
        <a href="wallet.html">Wallet</a>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" id="themeBtn" class="p-3 hover:bg-gray-800 rounded-2xl"><i class="fas fa-moon"></i></button>
        <button onclick="logout()" class="bg-red-600/20 text-red-400 px-6 py-2.5 rounded-2xl text-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="flex flex-col lg:flex-row h-[calc(100vh-80px)]">
    <!-- Main Video Area -->
    <div class="flex-1 relative video-feed">
      <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover"></video>
      
      <video id="localVideo" autoplay playsinline muted 
             class="absolute bottom-6 right-6 w-48 md:w-64 h-32 md:h-44 rounded-3xl border-4 border-emerald-400 shadow-2xl"></video>

      <div class="absolute top-6 left-6 bg-black/70 px-6 py-3 rounded-2xl flex items-center gap-4">
        <span class="text-red-500 text-2xl live-dot">●</span>
        <span id="tourStatus" class="font-semibold">Tour Started</span>
        <span id="liveTimer" class="text-sm">00:00</span>
      </div>

      <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-6 bg-black/70 px-8 py-4 rounded-3xl">
        <button onclick="toggleAudio()" class="p-5 hover:bg-gray-700 rounded-full text-3xl">🎤</button>
        <button onclick="toggleVideo()" class="p-5 hover:bg-gray-700 rounded-full text-3xl">📹</button>
        <button onclick="sendSOS()" class="bg-red-600 hover:bg-red-700 p-5 rounded-full text-3xl">🚨</button>
        <button onclick="endTour()" class="bg-gray-800 hover:bg-gray-700 p-5 rounded-full text-3xl">End Tour</button>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="w-full lg:w-96 bg-gray-900 border-l border-gray-800 flex flex-col">
      <div class="p-6 border-b">
        <h3 class="font-semibold mb-4">Tour Progress</h3>
        <div class="space-y-4">
          <div onclick="updateStatus(0)" class="flex gap-4 cursor-pointer">
            <div class="w-6 h-6 bg-emerald-500 rounded-full flex items-center justify-center text-xs">1</div>
            <div class="flex-1">Tour Started</div>
          </div>
          <div onclick="updateStatus(1)" class="flex gap-4 cursor-pointer">
            <div class="w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center text-xs">2</div>
            <div class="flex-1">Agent On Route</div>
          </div>
          <div onclick="updateStatus(2)" class="flex gap-4 cursor-pointer">
            <div class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-xs">3</div>
            <div class="flex-1">Arrived at Property</div>
          </div>
          <div onclick="updateStatus(3)" class="flex gap-4 cursor-pointer">
            <div class="w-6 h-6 bg-purple-500 rounded-full flex items-center justify-center text-xs">4</div>
            <div class="flex-1">Tour Completed</div>
          </div>
        </div>
      </div>

      <div class="flex-1 flex flex-col">
        <div class="p-6 border-b border-gray-800 font-medium">Live Chat with Agent</div>
        <div id="tourChat" class="flex-1 p-6 overflow-auto space-y-4"></div>
        
        <div class="p-6 border-t border-gray-800">
          <div class="flex gap-3">
            <input id="tourMsg" type="text" placeholder="Type message..." class="flex-1 bg-gray-800 p-4 rounded-2xl">
            <button onclick="sendTourMessage()" class="bg-emerald-600 px-8 rounded-2xl">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const socket = io('https://backend-tawaglit-ventures-production.up.railway.app');  // ← Your Railway URL

    let seconds = 0;
    let timerInterval;
    let localStream = null;

    function startTimer() {
      timerInterval = setInterval(() => {
        seconds++;
        const min = Math.floor(seconds / 60).toString().padStart(2, '0');
        const sec = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('liveTimer').textContent = `${min}:${sec}`;
      }, 1000);
    }

    async function startWebRTC() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
      } catch (err) {
        console.error("Camera access error:", err);
      }
    }

    function sendTourMessage() {
      const input = document.getElementById('tourMsg');
      if (!input.value.trim()) return;

      const msg = document.createElement('div');
      msg.className = "bg-emerald-600 p-4 rounded-2xl ml-auto max-w-[80%]";
      msg.textContent = input.value;
      document.getElementById('tourChat').appendChild(msg);
      input.value = '';

      socket.emit('send_message', { roomId: "tour_room", message: input.value, sender: "You" });
    }

    function sendSOS() {
      if (confirm("🚨 Send Emergency SOS?")) {
        alert("🛡️ SOS Alert Sent! Location shared with support.");
      }
    }

    function endTour() {
      if (confirm("End this guided tour?")) {
        clearInterval(timerInterval);
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        alert("✅ Tour completed. Recording saved.");
        window.location.href = 'property-detail.html';
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function logout() {
      if (confirm("Logout from Tawaglit Ventures?")) {
        localStorage.removeItem('tawaglit_user');
        window.location.href = 'index.html';
      }
    }

    window.onload = () => {
      startTimer();
      startWebRTC();
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark');
      }
    };
  </script>
</body>
</html>
