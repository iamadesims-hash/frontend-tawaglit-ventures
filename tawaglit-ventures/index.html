<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tawaglit Ventures - Premium Real Estate Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    .hero-bg {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
    }
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
    }
    .modal {
      animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalPop {
      from { transform: scale(0.85) translateY(30px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-950 text-white">
  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/80 backdrop-blur-lg z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 onclick="window.location='index.html'" class="text-3xl font-bold text-emerald-400 cursor-pointer">Tawaglit<span class="text-white">Ventures</span></h1>
      
      <div class="hidden md:flex gap-8 text-sm font-medium">
        <a href="properties.html" class="hover:text-emerald-400 transition">Properties</a>
        <a href="messages.html" class="hover:text-emerald-400 transition">Messages</a>
        <a href="community.html" class="hover:text-emerald-400 transition">Community</a>
        <a href="tour.html" class="hover:text-emerald-400 transition">Safe Tours</a>
        <a href="wallet.html" class="hover:text-emerald-400 transition">Wallet</a>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" id="themeBtn" class="p-3 hover:bg-gray-800 rounded-2xl transition"><i class="fas fa-moon"></i></button>
        <button onclick="showAuthModal()" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-3 rounded-2xl font-semibold transition">Login / Sign Up</button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-bg min-h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h2 class="text-5xl md:text-6xl lg:text-7xl font-bold leading-tight">The Future of Real Estate<br>is Here</h2>
      <p class="text-xl md:text-2xl mt-6 max-w-3xl mx-auto text-gray-200">
        Global platform with safe guided tours, secure multi-currency wallet, and premium community.
      </p>
      <div class="mt-12 flex flex-col sm:flex-row justify-center gap-6">
        <button onclick="window.location='properties.html'" 
                class="bg-white text-black px-12 py-6 rounded-3xl text-xl font-semibold hover:scale-105 transition">Browse Properties</button>
        <button onclick="showAuthModal()" 
                class="border border-white px-12 py-6 rounded-3xl text-xl font-semibold hover:bg-white/10 transition">Join as Agent</button>
      </div>
    </div>
  </section>

  <!-- Auth Modal -->
  <div id="authModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-gray-900 w-full max-w-md mx-4 rounded-3xl p-10 modal">
      <div class="flex justify-between items-center mb-8">
        <h3 id="modalTitle" class="text-3xl font-bold">Welcome to Tawaglit</h3>
        <button onclick="hideAuthModal()" class="text-3xl text-gray-400 hover:text-white">×</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <input id="loginEmail" type="email" placeholder="Email Address" class="w-full bg-gray-800 p-5 rounded-2xl mb-4">
        <input id="loginPassword" type="password" placeholder="Password" class="w-full bg-gray-800 p-5 rounded-2xl mb-6">
        <button onclick="performLogin()" class="w-full bg-emerald-600 py-5 rounded-2xl font-semibold text-lg">Login Securely</button>
        <div class="flex justify-between mt-6 text-sm">
          <span onclick="switchToSignup()" class="text-emerald-400 cursor-pointer">Create Account</span>
          <span onclick="switchToReset()" class="text-emerald-400 cursor-pointer">Forgot Password?</span>
        </div>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="hidden">
        <input id="signupName" type="text" placeholder="Full Name" class="w-full bg-gray-800 p-5 rounded-2xl mb-4">
        <input id="signupEmail" type="email" placeholder="Email Address" class="w-full bg-gray-800 p-5 rounded-2xl mb-4">
        <input id="signupPhone" type="tel" placeholder="Phone Number" class="w-full bg-gray-800 p-5 rounded-2xl mb-6">
        <button onclick="performSignup()" class="w-full bg-emerald-600 py-5 rounded-2xl font-semibold text-lg">Create Account</button>
      </div>

      <!-- OTP Form -->
      <div id="otpForm" class="hidden">
        <p class="text-center mb-6">Enter OTP sent to your email/phone</p>
        <input id="otpInput" type="text" maxlength="6" placeholder="123456" class="w-full bg-gray-800 p-5 rounded-2xl text-center text-3xl tracking-widest mb-6">
        <button onclick="verifyOTP()" class="w-full bg-emerald-600 py-5 rounded-2xl font-semibold">Verify OTP</button>
      </div>

      <button onclick="hideAuthModal()" class="mt-8 w-full text-gray-400">Close</button>
    </div>
  </div>

  <script>
    // Theme Toggle
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    // Modal Controls
    function showAuthModal() {
      document.getElementById('authModal').classList.remove('hidden');
      switchToLogin();
    }

    function hideAuthModal() {
      document.getElementById('authModal').classList.add('hidden');
    }

    function switchToLogin() {
      hideAllForms();
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = 'Welcome Back';
    }

    function switchToSignup() {
      hideAllForms();
      document.getElementById('signupForm').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = 'Create Account';
    }

    function switchToReset() {
      alert("Password reset link would be sent (Demo)");
    }

    function hideAllForms() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('signupForm').classList.add('hidden');
      document.getElementById('otpForm').classList.add('hidden');
    }

    function performLogin() {
      const email = document.getElementById('loginEmail').value || "user@tawaglit.com";
      
      localStorage.setItem('tawaglit_user', JSON.stringify({
        name: email.split('@')[0],
        email: email,
        role: "USER"
      }));

      hideAuthModal();
      alert("✅ Login successful with secure JWT authentication!");
      window.location.href = 'dashboard.html';
    }

    function performSignup() {
      alert("✅ Account created! OTP verification would be sent.");
      switchToLogin();
    }

    function verifyOTP() {
      alert("✅ OTP Verified Successfully!");
      hideAuthModal();
      window.location.href = 'dashboard.html';
    }

    // Load saved theme
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.remove('dark');
    }
  </script>
</body>
</html>
