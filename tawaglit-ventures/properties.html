<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties - Tawaglit Ventures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white pt-20">
  <!-- Shared Navbar -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 onclick="window.location='index.html'" class="text-2xl font-bold text-emerald-400 cursor-pointer">Tawaglit<span class="text-white">Ventures</span></h1>
      
      <div class="flex gap-8 text-sm font-medium">
        <a href="properties.html" class="text-emerald-400">Properties</a>
        <a href="messages.html" class="hover:text-emerald-400">Messages</a>
        <a href="community.html" class="hover:text-emerald-400">Community</a>
        <a href="tour.html" class="hover:text-emerald-400">Safe Tours</a>
        <a href="wallet.html" class="hover:text-emerald-400">Wallet</a>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" id="themeBtn" class="p-3 hover:bg-gray-800 rounded-2xl"><i class="fas fa-moon"></i></button>
        <button onclick="logout()" class="bg-red-600/20 text-red-400 px-6 py-2.5 rounded-2xl text-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold">Live Property Marketplace</h1>
      <div class="flex items-center gap-3 text-emerald-400 text-sm">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        <span id="liveStatus">LIVE UPDATES ENABLED</span>
      </div>
    </div>

    <!-- Filters -->
    <div class="bg-gray-900 p-6 rounded-3xl flex flex-wrap gap-4 mb-10">
      <input id="searchInput" type="text" placeholder="Search location, title or price..." 
             class="flex-1 bg-gray-800 p-5 rounded-2xl focus:outline-none">
      <select id="typeFilter" class="bg-gray-800 p-5 rounded-2xl">
        <option value="">All Types</option>
        <option value="House">Houses</option>
        <option value="Apartment">Apartments</option>
        <option value="Land">Land</option>
      </select>
      <button onclick="filterProperties()" class="bg-emerald-600 px-10 py-5 rounded-2xl font-semibold">Search</button>
    </div>

    <!-- Properties Grid -->
    <div id="propertiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <!-- Floating Message Button -->
  <button onclick="window.location='messages.html'" 
          class="fixed bottom-8 right-8 bg-emerald-600 w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl hover:scale-110 transition z-50">
    💬
  </button>

  <script>
    let properties = [
      {
        id: 1,
        title: "4-Bedroom Luxury Villa",
        price: "185000000",
        location: "Lekki Phase 1, Lagos",
        type: "House",
        img: "https://picsum.photos/id/1015/600/400"
      },
      {
        id: 2,
        title: "3-Bedroom Smart Apartment",
        price: "95000000",
        location: "Ikoyi, Lagos",
        type: "Apartment",
        img: "https://picsum.photos/id/201/600/400"
      },
      {
        id: 3,
        title: "Prime 800sqm Land",
        price: "450000000",
        location: "Banana Island, Lagos",
        type: "Land",
        img: "https://picsum.photos/id/237/600/400"
      }
    ];

    function renderProperties(data) {
      const grid = document.getElementById('propertiesGrid');
      grid.innerHTML = data.map(p => `
        <div onclick="viewProperty(${p.id})" class="bg-gray-900 rounded-3xl overflow-hidden cursor-pointer hover:scale-105 transition">
          <img src="${p.img}" class="w-full h-56 object-cover">
          <div class="p-6">
            <div class="flex justify-between items-start">
              <p class="text-emerald-400 font-bold text-xl">₦${Number(p.price).toLocaleString()}</p>
              <span class="text-xs bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-full">${p.type}</span>
            </div>
            <h3 class="font-semibold mt-3 text-lg">${p.title}</h3>
            <p class="text-gray-400">${p.location}</p>
          </div>
        </div>
      `).join('');
    }

    function filterProperties() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const type = document.getElementById('typeFilter').value;
      
      const filtered = properties.filter(p => 
        (p.title.toLowerCase().includes(search) || p.location.toLowerCase().includes(search)) &&
        (!type || p.type === type)
      );
      
      renderProperties(filtered);
    }

    function viewProperty(id) {
      window.location.href = `property-detail.html?id=${id}`;
    }

    // Real-time Updates Simulation
    function simulateLiveUpdates() {
      setInterval(() => {
        if (Math.random() > 0.6) {
          const randomIndex = Math.floor(Math.random() * properties.length);
          properties[randomIndex].price = (parseInt(properties[randomIndex].price) * 1.015).toFixed(0);
          
          renderProperties(properties);
          
          // Show toast notification
          const toast = document.createElement('div');
          toast.className = "fixed bottom-8 right-8 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl z-50";
          toast.textContent = `Price updated for ${properties[randomIndex].title}`;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 4000);
        }
      }, 7000);
    }

    // Theme & Logout
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function logout() {
      if (confirm("Logout from Tawaglit Ventures?")) {
        localStorage.removeItem('tawaglit_user');
        window.location.href = 'index.html';
      }
    }

    // Initialize
    window.onload = () => {
      renderProperties(properties);
      simulateLiveUpdates();

      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark');
      }
    };
  </script>
</body>
</html>
