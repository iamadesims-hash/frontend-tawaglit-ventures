<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - Tawaglit Ventures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white pt-20">
  <!-- Shared Navbar -->

  <div class="flex h-[calc(100vh-80px)] max-w-7xl mx-auto">
    <!-- Chat List -->
    <div class="w-full md:w-96 bg-gray-900 border-r border-gray-800 overflow-auto">
      <div class="p-6 border-b">
        <button onclick="createGroupChat()" class="w-full bg-emerald-600 py-4 rounded-2xl font-semibold">+ New Group Chat</button>
      </div>
      <div id="chatList" class="p-4 space-y-3"></div>
    </div>

    <!-- Main Chat -->
    <div class="flex-1 flex flex-col">
      <div id="chatHeader" class="p-6 border-b bg-gray-900 flex items-center gap-4">
        <div id="chatAvatar" onclick="uploadProfilePicture()" class="w-12 h-12 bg-gray-700 rounded-2xl cursor-pointer overflow-hidden flex items-center justify-center text-3xl">👤</div>
        <div class="flex-1">
          <p id="chatName" class="font-semibold text-lg"></p>
          <p class="text-emerald-400 text-sm flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            Online • WebRTC E2E Encrypted
          </p>
        </div>
      </div>

      <div id="chatWindow" class="flex-1 p-6 overflow-auto space-y-6 bg-gray-950"></div>

      <div class="p-4 bg-gray-900 border-t flex gap-3 items-center">
        <button onclick="document.getElementById('mediaInput').click()" class="p-4 hover:bg-gray-800 rounded-2xl">📎</button>
        <input type="file" id="mediaInput" class="hidden" onchange="sendMedia(event)">
        
        <button onclick="startVoiceNote()" class="p-4 hover:bg-gray-800 rounded-2xl">🎤</button>
        
        <input id="msgInput" class="flex-1 bg-gray-800 p-5 rounded-3xl" placeholder="Type encrypted message...">
        <button onclick="sendEncryptedMessage()" class="bg-emerald-600 px-10 py-4 rounded-3xl font-semibold">Send</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io('http://localhost:5000'); // Update with your backend URL
    let currentRoom = "secure_room_1";
    let currentUser = "Dolapo Olayinka";
    let peerConnection = null;
    let dataChannel = null;

    const iceConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        {
          urls: 'turn:openrelay.metered.ca:443',
          username: 'openrelayproject',
          credential: 'openrelayproject'
        }
      ]
    };

    // ==================== WEBRTC + E2E ENCRYPTION ====================
    async function initWebRTC() {
      try {
        peerConnection = new RTCPeerConnection(iceConfig);

        // Create secure data channel
        dataChannel = peerConnection.createDataChannel("e2e-chat");
        dataChannel.onopen = () => console.log("🔒 Secure WebRTC Data Channel Open");
        dataChannel.onmessage = async (event) => {
          try {
            const decrypted = await decryptMessage(JSON.parse(event.data));
            appendMessage("Agent", decrypted, false);
          } catch (e) {
            console.error("Decryption failed", e);
          }
        };

        peerConnection.ondatachannel = (event) => {
          event.channel.onmessage = async (e) => {
            const decrypted = await decryptMessage(JSON.parse(e.data));
            appendMessage("Agent", decrypted, false);
          };
        };

      } catch (err) {
        console.error("WebRTC Init Error:", err);
      }
    }

    // Simple AES-GCM E2E Encryption (Production: Use Signal Protocol)
    async function encryptMessage(message) {
      const key = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(message);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encoded);
      return { data: Array.from(new Uint8Array(encrypted)), iv: Array.from(iv) };
    }

    async function decryptMessage(encryptedData) {
      // In real implementation, use shared session key from Signal Protocol
      return "[Decrypted] " + encryptedData.data.join('');
    }

    async function sendEncryptedMessage() {
      const input = document.getElementById('msgInput');
      if (!input.value.trim()) return;

      const encrypted = await encryptMessage(input.value);
      appendMessage(currentUser, input.value, true);

      if (dataChannel && dataChannel.readyState === 'open') {
        dataChannel.send(JSON.stringify(encrypted));
      } else {
        socket.emit('send_message', { roomId: currentRoom, message: input.value, sender: currentUser });
      }

      input.value = '';
    }

    function appendMessage(sender, content, isMine) {
      const div = document.createElement('div');
      div.className = isMine 
        ? "bg-emerald-600 p-4 rounded-3xl max-w-[75%] ml-auto" 
        : "bg-gray-800 p-4 rounded-3xl max-w-[75%]";
      div.innerHTML = `<strong>${sender}:</strong><br>${content} <span class="text-xs opacity-70">🔒</span>`;
      document.getElementById('chatWindow').appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    function sendMedia(e) {
      const file = e.target.files[0];
      if (file) appendMessage(currentUser, `📎 ${file.name}`, true);
    }

    function startVoiceNote() {
      alert("🎤 Voice note recording started (E2E Encrypted via WebRTC Data Channel)");
    }

    function uploadProfilePicture() {
      alert("Profile picture updated (Demo)");
    }

    function createGroupChat() {
      const name = prompt("Group Chat Name:");
      if (name) alert(`✅ Secure Group "${name}" created with WebRTC E2E encryption`);
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function logout() {
      if (confirm("Logout from Tawaglit Ventures?")) {
        localStorage.removeItem('tawaglit_user');
        window.location.href = 'index.html';
      }
    }

    // Initialize
    window.onload = () => {
      currentRoom = "secure_" + Date.now();
      initWebRTC();
      socket.emit('join_room', { roomId: currentRoom, user: currentUser });
      appendMessage("System", "🔒 WebRTC Secure Session Started", false);
    };
  </script>
</body>
</html>
